: Executar Robo CADE on: push: branches: [main] schedule: - cron: '0 12 * * 1-5' jobs: run-bot: runs-on: ubuntu-latest steps: - uses: actions/checkout@v4 - uses: actions/setup-python@v4 with: python-version: '3.10' - run: pip install -r requirements.txt - name: Ensure documentos directory exists run: mkdir -p documentos - env: GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }} GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }} run: python script_cade.py
